<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administración</title>
  <!-- Tailwind CSS CDN -->
  <!-- REEMPLAZA LA LÍNEA DE ://tailwind.com POR ESTO: -->
<style>
  /* Parche de estilos locales idénticos a Tailwind para arreglar tu pantalla */
  body { font-family: ui-sans-serif, system-ui, sans-serif; background-color: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .max-w-4xl { width: 100%; max-w: 56rem; background-color: white; tragedies; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1.5rem; }
  .space-y-4 > * + * { margin-top: 1rem; }
  .hidden { display: none !important; }
  .flex { display: flex; }
  .justify-between { justify-content: space-between; }
  .items-center { align-items: center; }
  .bg-indigo-600 { background-color: #4f46e5; color: white; }
  .bg-red-500 { background-color: #ef4444; color: white; }
  .bg-green-600 { background-color: #16a34a; color: white; }
  button { padding: 0.5rem 1rem; border-radius: 0.375rem; font-weight: 500; cursor: pointer; border: none; }
  input { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; margin-top: 0.25rem; }
  table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  th, td { padding: 0.75rem 1.5rem; text-align: left; border-bottom: 1px solid #e5e7eb; }
  th { background-color: #f9fafb; font-size: 0.75rem; text-transform: uppercase; color: #6b7280; }
  .rounded-full { border-radius: 9999px; padding: 0.25rem 0.5rem; font-size: 0.75rem; font-weight: 600; }
  .bg-red-100 { background-color: #fee2e2; color: #991b1b; }
  .bg-green-100 { background-color: #dcfce7; color: #166534; }
  .bg-indigo-50 { background-color: #e0e7ff; color: #3730a3; }
  .bg-red-50 { background-color: #fee2e2; color: #991b1b; }
</style>

  <!-- Scripts -->
  <script defer src="js/auth.js"></script>
  <script defer src="js/admin.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
  
  <!-- Contenedor principal -->
  <div class="w-full max-w-4xl bg-white rounded-lg shadow-md p-6 space-y-8">
    
    <!-- Bloques de Alertas -->
    <div id="alert-success" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded text-center">
      ¡Operación realizada con éxito!
    </div>
    <div id="alert-error" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded text-center">
      Ocurrió un error.
    </div>

    <!-- Formulario de Login -->
    <section id="login-section" class="space-y-4">
      <h2 class="text-2xl font-semibold text-center">Iniciar Sesión</h2>
      <form id="form-login" class="space-y-4">
        <div>
          <label for="login-email" class="block text-sm font-medium text-gray-700">Correo</label>
          <input type="email" id="login-email" name="email" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border" required />
        </div>
        <div>
          <label for="login-password" class="block text-sm font-medium text-gray-700">Contraseña</label>
          <input type="password" id="login-password" name="password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border" required />
        </div>
        <button type="submit" id="login-button" class="w-full bg-indigo-600 text-white py-2 rounded-md hover:bg-indigo-700 transition">Ingresar</button>
      </form>
      <p class="text-center text-sm text-gray-600">
        ¿No tienes cuenta? <a href="#" id="show-register" onclick="document.getElementById('login-section').classList.add('hidden'); document.getElementById('register-section').classList.remove('hidden'); return false;" class="text-indigo-600 hover:underline">Regístrate</a>
      </p>
    </section>

    <!-- Formulario de Registro -->
    <section id="register-section" class="hidden space-y-4">
      <h2 class="text-2xl font-semibold text-center">Crear Cuenta</h2>
      <form id="form-register" class="space-y-4">
        <div>
          <label for="register-name" class="block text-sm font-medium text-gray-700">Nombre</label>
          <input type="text" id="register-name" name="nombre" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border" required />
        </div>
        <div>
          <label for="register-email" class="block text-sm font-medium text-gray-700">Correo</label>
          <input type="email" id="register-email" name="email" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border" required />
        </div>
        <div>
          <label for="register-password" class="block text-sm font-medium text-gray-700">Contraseña</label>
          <input type="password" id="register-password" name="password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2 border" required />
        </div>
        <button type="submit" id="register-button" class="w-full bg-green-600 text-white py-2 rounded-md hover:bg-green-700 transition">Crear Cuenta</button>
      </form>
      <p class="text-center text-sm text-gray-600">
        ¿Ya tienes cuenta? <a href="#" id="show-login" onclick="document.getElementById('register-section').classList.add('hidden'); document.getElementById('login-section').classList.remove('hidden'); return false;" class="text-indigo-600 hover:underline">Inicia Sesión</a>
      </p>
    </section>

    <!-- Dashboard / Panel de Administración -->
    <section id="dashboard-section" class="hidden">
      
      <!-- 🛠️ ESTE ES EL NUEVO BLOQUE CON EL BOTÓN DE REGRESAR / CERRAR SESIÓN -->
      <div class="flex justify-between items-center mb-6 border-b pb-4">
        <h2 class="text-2xl font-bold text-gray-800">Panel de Administración</h2>
        <button id="logout-button" class="bg-red-500 hover:bg-red-600 text-white font-medium px-4 py-2 rounded-md transition text-sm shadow">
          Cerrar Sesión
        </button>
      </div>

      <div class="overflow-x-auto">
        <table id="users-table" class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nombre</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Correo</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Rol</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Acciones</th>
            </tr>
          </thead>
          <tbody id="users-tbody" class="bg-white divide-y divide-gray-200">
            <!-- Las filas son generadas dinámicamente por admin.js -->
          </tbody>
        </table>
      </div>
    </section>
  </div>
</body>
</html>
